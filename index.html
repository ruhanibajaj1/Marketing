<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruhani Bajaj — Strategy, Marketing & Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: #232323;
    --accent: #b8cdd9;
    --accent2: #7fa8be;
    --text: #e8e2d9;
    --muted: #666;
    --muted2: #444;
    --white: #f5f0eb;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  .cursor {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transition: transform 0.15s ease;
    mix-blend-mode: difference;
  }
  .cursor-ring {
    width: 32px; height: 32px;
    border: 1px solid var(--accent2);
    border-radius: 50%;
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9998;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s;
    opacity: 0.5;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 28px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(10,10,10,0.95) 0%, transparent 100%);
  }
  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .nav-links {
    display: flex; gap: 40px; list-style: none;
  }
  .nav-links a {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 60px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-bg-text {
    position: absolute;
    top: 50%;
    left: -20px;
    transform: translateY(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(120px, 18vw, 280px);
    font-weight: 300;
    color: transparent;
    -webkit-text-stroke: 1px var(--border);
    line-height: 0.85;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    animation: fadeInSlow 2s ease forwards;
    opacity: 0;
  }

  .hero-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    animation: slideUp 0.8s ease 0.3s forwards;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(52px, 8vw, 110px);
    font-weight: 300;
    line-height: 0.9;
    color: var(--white);
    letter-spacing: -0.02em;
    opacity: 0;
    animation: slideUp 0.8s ease 0.5s forwards;
  }

  .hero-name em {
    font-style: italic;
    color: var(--accent);
  }

  .hero-sub {
    margin-top: 28px;
    max-width: 520px;
    font-size: 15px;
    line-height: 1.7;
    color: var(--muted);
    font-weight: 300;
    opacity: 0;
    animation: slideUp 0.8s ease 0.7s forwards;
  }

  .hero-bottom {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-top: 52px;
    opacity: 0;
    animation: slideUp 0.8s ease 0.9s forwards;
  }

  .hero-cta {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--bg);
    background: var(--accent);
    padding: 14px 28px;
    text-decoration: none;
    transition: all 0.3s ease;
  }
  .hero-cta:hover {
    background: var(--white);
    transform: translateY(-2px);
  }

  .hero-scroll {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--muted2);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-scroll::before {
    content: '';
    display: block;
    width: 40px;
    height: 1px;
    background: var(--muted2);
    animation: lineExpand 1.5s ease 1.5s both;
  }

  .hero-line {
    position: absolute;
    right: 60px;
    bottom: 80px;
    width: 1px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, var(--muted2));
    animation: fadeInSlow 1s ease 1.5s forwards;
    opacity: 0;
  }

  /* DIVIDER */
  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 0 60px;
  }

  /* SECTION SHELL */
  section {
    padding: 100px 60px;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 60px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    max-width: 200px;
  }

  /* ABOUT */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }
  .about-headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(34px, 4vw, 56px);
    font-weight: 300;
    line-height: 1.15;
    color: var(--white);
  }
  .about-headline em { font-style: italic; color: var(--accent); }
  .about-body {
    font-size: 15px;
    line-height: 1.85;
    color: var(--muted);
    font-weight: 300;
  }
  .about-body p + p { margin-top: 20px; }
  .about-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    margin-top: 48px;
  }
  .stat {
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 42px;
    font-weight: 300;
    color: var(--white);
    line-height: 1;
  }
  .stat-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* WORK */
  .work-item {
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 40px;
    align-items: start;
    padding: 48px 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    transition: all 0.3s ease;
  }
  .work-item:first-of-type { border-top: 1px solid var(--border); }
  .work-item:hover { padding-left: 16px; }
  .work-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s ease;
    transform-origin: top;
  }
  .work-item:hover::before { transform: scaleY(1); }

  .work-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.1em;
    padding-top: 4px;
  }
  .work-role {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--white);
    margin-bottom: 6px;
  }
  .work-company {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .work-desc {
    font-size: 14px;
    line-height: 1.75;
    color: var(--muted);
    max-width: 560px;
  }
  .work-year {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted2);
    letter-spacing: 0.1em;
    white-space: nowrap;
    padding-top: 4px;
  }
  .work-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 10px;
  }

  /* WORK SAMPLES */
  .samples-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
    margin-bottom: 60px;
  }
  .sample-card {
    background: var(--surface);
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    cursor: none;
  }
  .sample-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    filter: grayscale(20%);
  }
  .sample-card:hover img {
    transform: scale(1.05);
    filter: grayscale(0%);
  }
  .sample-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,10,0.85) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }
  .sample-card:hover .sample-overlay { opacity: 1; }
  .sample-overlay-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .blogs-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .blog-card {
    background: var(--surface);
    padding: 36px 32px;
    text-decoration: none;
    display: block;
    position: relative;
    overflow: hidden;
    transition: background 0.3s;
    border-bottom: 2px solid transparent;
  }
  .blog-card:hover {
    background: var(--surface2);
    border-bottom-color: var(--accent);
  }
  .blog-num {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted2);
    margin-bottom: 20px;
  }
  .blog-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--white);
    line-height: 1.3;
    margin-bottom: 16px;
    transition: color 0.3s;
  }
  .blog-card:hover .blog-title { color: var(--accent); }
  .blog-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--muted2);
    text-transform: uppercase;
  }
  .blog-arrow {
    position: absolute;
    bottom: 28px; right: 28px;
    font-size: 18px;
    color: var(--muted2);
    transition: all 0.3s;
  }
  .blog-card:hover .blog-arrow {
    color: var(--accent);
    transform: translate(4px, -4px);
  }

  /* SKILLS */
  .skills-layout {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 80px;
  }
  .skills-intro {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    line-height: 1.2;
    color: var(--white);
    position: sticky;
    top: 120px;
  }
  .skills-intro em { font-style: italic; color: var(--accent); }
  .skills-categories { display: flex; flex-direction: column; gap: 40px; }
